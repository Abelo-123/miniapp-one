<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Completed</title>
</head>
<body style="font-family: sans-serif; text-align: center; background: #0a0a0f; color: white; padding-top: 50px;">
    <h2>Processing...</h2>
    <p>Closing checkout window...</p>
    <script>
        // 1. Try to close the popup window immediately (for browsers/desktop)
        try {
            window.close();
        } catch (e) {
            console.error("Failed to auto-close window:", e);
        }
        
        // 2. Redirect to the Telegram Bot link (for Telegram in-app browser webview)
        // Telegram intercepts this deep link, closes the overlay browser, and redirects to your bot.
        setTimeout(() => {
            window.location.href = "https://t.me/paxyo_bot?startapp=open";
        }, 150);
    </script>
</body>
</html>
