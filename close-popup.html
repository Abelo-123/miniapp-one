<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Completed</title>
</head>
<body style="font-family: sans-serif; text-align: center; background: #0a0a0f; color: white; padding-top: 50px;">
    <h2>Processing...</h2>
    <p>Closing checkout window...</p>
    <script>
        // 1. Try to close the popup window immediately (for standard browsers/desktop popups)
        try {
            window.close();
        } catch (e) {
            console.error("Failed to auto-close window:", e);
        }
        
        // 2. Redirect to the Telegram Bot link
        // We try the native tg:// protocol first which tells the Telegram app to open the bot immediately.
        // If it fails (or on standard browsers), we fallback to the normal t.me link.
        try {
            window.location.replace("tg://resolve?domain=paxyo_bot&startapp=open");
        } catch (e) {
            window.location.replace("https://t.me/paxyo_bot?startapp=open");
        }
    </script>
</body>
</html>
