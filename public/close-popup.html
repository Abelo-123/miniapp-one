<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Completed</title>
</head>
<body style="font-family: sans-serif; text-align: center; background: #0a0a0f; color: white; padding-top: 50px;">
    <h2>Processing...</h2>
    <p>Closing checkout window...</p>
    <script>
        // 1. Check if we have launch parameters stored (which indicates we are running inside Telegram's main WebApp window)
        const launchParams = sessionStorage.getItem('paxyo:launch_params');
        
        if (launchParams) {
            // Inside Telegram WebView: Navigate the current window directly back to the Mini App
            try {
                const basePath = window.location.pathname.replace('close-popup.html', '');
                const appUrl = window.location.origin + basePath + launchParams;
                window.location.replace(appUrl);
            } catch (e) {
                // Ultimate fallback
                window.location.replace("tg://resolve?domain=paxyo_bot&startapp=open");
            }
        } else {
            // Outside Telegram (Popup mode): Attempt to close the popup window
            try {
                window.close();
            } catch (e) {
                console.error("Failed to close window:", e);
            }
            
            // If the window is still open (meaning it failed to close), fallback to the default bot link.
            setTimeout(function() {
                if (!window.closed) {
                    window.location.replace("https://t.me/paxyo_bot?startapp=open");
                }
            }, 1000);
        }
    </script>
</body>
</html>
