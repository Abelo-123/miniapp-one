<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        .icon-wrapper {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(0, 210, 106, 0.1);
            border: 2px solid rgba(0, 210, 106, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 106, 0.2); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(0, 210, 106, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 106, 0); }
        }
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #a5a5b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 15px;
            color: #a5a5b0;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0063cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">✓</div>
        <h2>Payment Processed</h2>
        <p id="status-message">Verifying your transaction...</p>
        <button id="close-btn" class="btn" onclick="handleClose()">Close & Return to Bot</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        // Accurate detection: are we running INSIDE the Telegram App WebView/Iframe?
        const hasTelegramUA = /Telegram/i.test(navigator.userAgent);
        const isInIframe = window.parent && window.parent !== window;
        const hasTelegramAPI = !!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData);
        const isTelegramApp = hasTelegramUA || isInIframe || hasTelegramAPI;

        const statusMsg = document.getElementById('status-message');
        const closeBtn = document.getElementById('close-btn');

        if (isTelegramApp) {
            // Mobile WebApp / Native in-app browser context
            statusMsg.innerHTML = "Your payment transaction has been processed successfully.<br><br>You can now close this window to return to your wallet.";
            closeBtn.innerText = "Close Window";
            
            // Try to auto-ready Telegram WebApp
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.ready();
                }
            } catch (e) {}
        } else {
            // External browser context (Chrome/Edge on Desktop)
            statusMsg.innerHTML = "Your payment transaction has been processed successfully!<br><br>You can safely close this browser tab and return to Telegram.";
            closeBtn.innerText = "Return to Telegram";
        }

        function handleClose() {
            // 1. Try closing native WebApp if available
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.close();
                    return;
                }
            } catch (e) {}

            // 2. Try programmatically closing the window
            try {
                window.close();
            } catch (e) {}

            // 3. If still open (e.g. Chrome tab), deep link to focus the Telegram App
            setTimeout(function() {
                try {
                    window.location.replace("tg://resolve?domain=eertert_bot&startapp=open");
                } catch (e) {
                    window.location.replace("https://t.me/eertert_bot?startapp=open");
                }
            }, 200);
        }

        // Auto-close fallback for desktop/external windows after 2.5 seconds
        setTimeout(handleClose, 2500);
    </script>
</body>
</html>
